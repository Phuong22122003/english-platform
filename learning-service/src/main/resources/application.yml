spring:
  application:
    name: learning-service
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: ${DB_CONNECTION_URL:jdbc:postgresql://localhost:5434/learningservice}
    username: ${DB_CONNECTION_USERNAME:dbowner}
    password: ${DB_CONNECTION_PASSWORD:dbowner}

server:
  port: 8083
  servlet:
    context-path: /learning-service

cloudinary:
  cloud_name: ${CLOUD_NAME:your_cloud_name}
  api_key: ${CLOUD_API_KEY:your_cloud_key}
  api_secret: ${CLOUD_API_SECRET:your_cloud_secret_key}

app:
  services:
    content: ${CONTENT_SERVICE_URL:http://localhost:8082/content-service}
    agent: ${AGENT_SERVICE_URL:http://localhost:5000/agent-service}
    user: ${USER_SERVICE_URL:http://localhost:8081/user-service}